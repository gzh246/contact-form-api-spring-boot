spring:
  application:
    name: contact-api-demo
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:contacts;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          ssl:
            enable: ${SMTP_SSL:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT_MS:10000}
          timeout: ${SMTP_READ_TIMEOUT_MS:10000}
          writetimeout: ${SMTP_WRITE_TIMEOUT_MS:10000}

server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:}
  forward-headers-strategy: framework
  error:
    include-message: never

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${CONTACT_MAIL_FROM:}
    to: ${CONTACT_MAIL_TO:}
    subject-prefix: "${CONTACT_MAIL_SUBJECT_PREFIX:[Contact Form]}"

management:
  health:
    mail:
      enabled: ${APP_MAIL_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: Contact Form REST API Demo
    description: Self-initiated Java/Spring Boot portfolio demo using synthetic data
    version: 1.0.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
